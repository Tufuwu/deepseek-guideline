name: Node CI

on: [push, pull_request]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v2
    - name: Use Node.js
      uses: actions/setup-node@v1
      with:
        node-version: node
    - run: npm ci
    - run: make clean
    - run: make
    - run: npx mocha-headless-chrome -a no-sandbox -f test/index.html

